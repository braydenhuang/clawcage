# ============================================================
# NETWORKS
# ============================================================
networks:

  internal_net:
    driver: bridge
    internal: true
    ipam:
      config:
        - subnet: 172.30.0.0/24

  external_net:
    driver: bridge
    internal: false


# ============================================================
# SECRETS
# ============================================================
secrets:

  fw_private_key:
    file: ./secrets/fw_private.key

  fw_public_key:
    file: ./secrets/fw_public.key

  openclaw_private_key:
    file: ./secrets/openclaw_private.key

  openclaw_public_key:
    file: ./secrets/openclaw_public.key


# ============================================================
# SERVICES
# ============================================================
services:

  wireguard-fw:
    build:
      context: ./wireguard-fw
      dockerfile: Dockerfile
    container_name: wireguard-fw
    hostname: wireguard-fw
    restart: unless-stopped

    networks:
      internal_net:
        ipv4_address: 172.30.0.2
      external_net:

    cap_add:
      - NET_ADMIN
      - SYS_MODULE

    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1

    secrets:
      - fw_private_key
      - openclaw_public_key

    volumes:
      # wg0.conf is baked into the image via Dockerfile COPY — no bind mount needed
      - ./wireguard-fw/allowlist-domains.txt:/etc/fw/allowlist-domains.txt:ro
      - ./wireguard-fw/allowlist-ips.txt:/etc/fw/allowlist-ips.txt:ro
      - fw_unbound_data:/var/lib/unbound
      - fw_logs:/var/log/unbound

    tmpfs:
      - /run/wireguard:size=1m,mode=0700

    expose:
      - "51820/udp"
      - "53/udp"
      - "53/tcp"

    healthcheck:
      test: ["CMD", "wg", "show", "wg0"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 5s


  openclaw:
    build:
      context: ./openclaw
      dockerfile: Dockerfile
    container_name: openclaw
    hostname: openclaw
    restart: unless-stopped

    networks:
      - internal_net

    dns_search: []
    dns_opt:
      - ndots:0

    cap_add:
      - NET_ADMIN

    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
      - net.ipv6.conf.default.disable_ipv6=1

    secrets:
      - openclaw_private_key
      - fw_public_key

    # wg-client.conf is baked into the image via Dockerfile COPY — no bind mount needed

    tmpfs:
      - /run/wireguard:size=1m,mode=0700    # wg0.conf in RAM only
      - /run:size=32m,mode=0755             # required by wg-quick at runtime
      - /tmp:size=128m,mode=1777            # general runtime scratch space

    dns:
      - 172.30.0.2

    environment:
      - NO_PROXY=localhost,127.0.0.1

    depends_on:
      wireguard-fw:
        condition: service_healthy


# ============================================================
# VOLUMES
# ============================================================
volumes:

  fw_unbound_data:

  fw_logs: