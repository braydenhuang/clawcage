[Interface]
PrivateKey = REPLACE_PRIVATE_KEY
Address = 10.0.0.2/24

# Unbound on the firewall container, reachable via the tunnel
DNS = 10.0.0.1

# Prevent wg-quick from adding a default route that bypasses
# the kill switch below
Table = off

[Peer]
PublicKey = REPLACE_FW_PUBKEY
Endpoint = 172.30.0.2:51820

# Route ALL traffic through the firewall peer
AllowedIPs = 0.0.0.0/0

PersistentKeepalive = 25