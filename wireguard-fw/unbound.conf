# Resolves DNS queries in the firewall container.
# This is an Unbound configuration with strong hardening and DNSSEC validation.

server:
    interface: 127.0.0.1
    interface: 10.0.0.1
    port: 53
    do-ip4: yes
    do-udp: yes
    do-tcp: yes
    do-ip6: no

    # Local DNSSEC validation on all responses regardless of upstream
    module-config: "validator iterator"
    auto-trust-anchor-file: "/var/lib/unbound/root.key"
    harden-dnssec-stripped: yes       # reject unsigned responses that should be signed
    harden-glue: yes
    harden-referral-path: yes
    harden-algo-downgrade: yes        # reject algorithm downgrade attacks
    harden-large-queries: yes
    harden-short-bufsize: yes
    harden-below-nxdomain: yes        # RFC 8020 — if parent is NXDOMAIN, so are children
    use-caps-for-id: yes              # 0x20 bit randomisation, spoofing defence
    val-clean-additional: yes

    # Only answer queries from localhost (this container)
    access-control: 0.0.0.0/0 refuse
    access-control: 127.0.0.0/8 allow
    access-control: 10.0.0.0/24 allow  # WireGuard subnet (OpenClaw's DNS queries)

    # Reject upstream answers that resolve to private IPs (DNS rebinding defence)
    private-address: 10.0.0.0/8 # Wireguard network
    private-address: 172.16.0.0/12 # Docker network
    private-address: 192.168.0.0/16
    private-address: 127.0.0.0/8
    private-address: fd00::/8
    private-address: fe80::/10
    private-address: ::ffff:0:0/96

    # Don't leak hostname or version
    hide-identity: yes
    hide-version: yes

    # Aggressive NSEC reduces unnecessary upstream queries
    aggressive-nsec: yes

    # Limit cache size to prevent memory-based DoS
    msg-cache-size: 50m
    rrset-cache-size: 100m

    # Rate-limit responses to slow enumeration/amplification
    ratelimit: 500

    # Minimize query name in upstream requests (RFC 7816 — QNAME minimisation)
    qname-minimisation: yes

    # Strip unnecessary sections from replies
    minimal-responses: yes

    # TLS bundle for verifying upstream resolver certificates
    tls-cert-bundle: /etc/ssl/certs/ca-certificates.crt


# ============================================================
# FORWARD ZONE: internal corporate domains
# Resolved via internal DNS servers.
# Pin the expected certificate names to prevent MITM.
# ============================================================
#forward-zone:
    #name: "corporate.net"
    #forward-tls-upstream: yes

    # Primary internal DNS — pin by TLS hostname
    #forward-addr: 10.10.0.53@853#dns1.corporate.net
    #forward-addr: 10.10.0.54@853#dns2.corporate.net

    # DNSSEC validation still runs locally on responses
    # If corporate.net is not DNSSEC-signed, Unbound will accept
    # the response but cannot cryptographically verify it —
    # you are then trusting the internal DNS servers implicitly.


# ============================================================
# FORWARD ZONE: everything else
# Resolved via Cloudflare and Google over DoT.
# ============================================================
forward-zone:
    name: "."
    forward-tls-upstream: yes

    # Cloudflare — primary
    forward-addr: 1.1.1.1@853#cloudflare-dns.com
    forward-addr: 1.0.0.1@853#cloudflare-dns.com

    # Google — fallback
    forward-addr: 8.8.8.8@853#dns.google
    forward-addr: 8.8.4.4@853#dns.google