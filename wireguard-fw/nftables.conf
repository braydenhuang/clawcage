#!/usr/sbin/nft -f

flush ruleset

# ============================================================
# SETS — populated at runtime by refresh-dns.sh via Unbound
# ============================================================

table inet filter {

    # Dynamic set: IPs resolved from allowed domains (refreshed by cron)
    set allowed_domain_ips {
        type ipv4_addr
    }

    # Static set: explicitly allowed IP:port:proto combinations
    set allowed_tcp_endpoints {
        type ipv4_addr . inet_service   # IP + port composite key
        flags interval
    }

    set allowed_udp_endpoints {
        type ipv4_addr . inet_service
        flags interval
    }

    # ============================================================
    # INPUT chain — traffic destined for this container
    # ============================================================
    chain input {
        type filter hook input priority 0; policy drop;

        # Loopback always allowed
        iif lo accept

        # WireGuard tunnel ingress
        udp dport 51820 accept

        # DNS queries from OpenClaw to Unbound
        ip saddr 10.0.0.0/24 udp dport 53 accept
        ip saddr 10.0.0.0/24 tcp dport 53 accept

        # Established/related (e.g. DNS replies inbound)
        ct state established,related accept

        drop
    }

    # ============================================================
    # FORWARD chain — traffic passing through this container
    # ============================================================
    chain forward {
        type filter hook forward priority 0; policy drop;

        # Established/related flows pass freely
        ct state established,related accept

        # Raw TCP: match IP+port composite set
        ip daddr . tcp dport @allowed_tcp_endpoints accept

        # Raw UDP: match IP+port composite set
        ip daddr . udp dport @allowed_udp_endpoints accept

        drop
    }

    # ============================================================
    # OUTPUT chain — traffic originating from this container
    # (Unbound DNS queries, WireGuard handshakes)
    # ============================================================
    chain output {
        type filter hook output priority 0; policy drop;

        oif lo accept
        ct state established,related accept

        # Unbound recursive DNS resolution (outbound UDP/TCP 53)
        udp dport 53 accept
        tcp dport 53 accept

        # Unbound DNS over TLS (DoT) upstream queries
        tcp dport 853 accept

        # Allow this container to reach WireGuard peers
        udp dport 51820 accept

        drop
    }
}

# ============================================================
# NAT — masquerade forwarded traffic on the external interface
# ============================================================
table ip nat {
    chain postrouting {
        type nat hook postrouting priority srcnat; policy accept;

        # NOTE:
        # MUST be the external_net interface. Check if it's set correctly by running "ip addr show [eth here]" in your container.
        # Change to other interface as necessary.
        oifname "eth0" masquerade
    }
}